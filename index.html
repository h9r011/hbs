<!DOCTYPE html>

<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>С Днем Рождения Саша</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: #0f0f0f;
            color: #f5f5f5;
            font-family: 'Inter', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .container {
            width: 100%;
            max-width: 900px;
            text-align: center;
        }

        .hero-text {
            font-size: 1.1rem;
            line-height: 1.8;
            color: rgba(255,255,255,.85);
            max-width: 650px;
            margin: 0 auto;
        }

        .open-btn {
            margin-top: 40px;
            border: 1px solid rgba(212,180,131,.4);
            background: transparent;
            color: #d4b483;
            padding: 14px 40px;
            border-radius: 999px;
            cursor: pointer;
            font-size: 1rem;
            transition: .3s;
        }

        .open-btn:hover {
            background: rgba(212,180,131,.1);
        }

        .video-section {
            display: none;
            opacity: 0;
            transition: opacity .8s ease;
            margin-top: 60px;
        }

        .video-section.visible {
            display: block;
            opacity: 1;
        }

        video {
            width: 100%;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0,0,0,.5);
        }

        .footer-text {
            margin-top: 30px;
            font-size: 1rem;
            color: rgba(255,255,255,.7);
        }
    </style>


</head>
<body>

<div class="container">
    <p class="hero-text">
        Одна небольшая история одного человека, который...
    </p>

    <button class="open-btn" id="openVideo">
        Открыть
    </button>

    <div class="video-section" id="videoSection">

        <video controls playsinline>
            <source src="./narrow.mp4" type="video/mp4">
        </video>

        <div class="footer-text">
            (Рекомендасьон: Не сильно обращать на качество записи)
        </div>

    </div>

</div>

<script>
    const button = document.getElementById('openVideo');
    const section = document.getElementById('videoSection');

    button.addEventListener('click', () => {
        button.style.display = 'none';

        section.style.display = 'block';

        requestAnimationFrame(() => {
            section.classList.add('visible');
        });

        section.scrollIntoView({
            behavior: 'smooth',
            block: 'start'
        });
    });
</script>

</body>
</html>
